# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ja-JP"

reviews:
  review_status: true
  review_details: true
  fail_commit_status: true

  auto_review:
    enabled: true
    auto_incremental_review: true
    base_branches:
      - "^(develop|refs/heads/develop)$" # develop を base にするPRのみ自動レビュー
    drafts: true

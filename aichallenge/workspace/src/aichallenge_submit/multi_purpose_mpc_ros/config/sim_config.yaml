sim_logger:
  animation_enabled: true

map:
  # path from pkg share dir
  yaml_path: "maps/occupancy_grid_map.yaml"

waypoints:
  # path from pkg share dir
  csv_path: "maps/occupancy_grid_map_waypoints.csv"

obstacles:
  # 2026 gate/race obstacle source is /v2x/vehicle_positions only.
  # Keep empty so obstacle information is subscribed from the topic.
  csv_path: ""
  radius: 1.25


reference_path:
  update_by_topic: false # When true, 'circle' must be false
  # path from pkg share dir
  csv_path: "maps/optimized_traj_mincurv.csv"
  resolution: 0.6
  smoothing_distance: 3
  max_width: 6.0
  circular: true
  use_path_constraints_topic: false
  use_border_cells_topic: false

bicycle_model:
  length: 1.087
  width: 1.45

mpc:
  N: 20
  Q: [3.0, 100.0, 5.0]  # [v, delta, t]
  # Q: [5.0, 90.0, 5.0]  # [v, delta, t]
  # Q: [10.0, 80.0, 5.0]  # [v, delta, t]
  R: [0.0, 300.0]      # [v, delta]
  QN: [3.0, 1.5, 5.0]
  v_max: 30.0 # km/h
  a_min: -3.2 # m/s^2
  a_max: 3.2 # m/s^2
  ay_max: 50.0 # m/s^2, maximum lateral acceleration in curves
  delta_max_deg: 80.0 # degrees
  control_rate: 50.0 # Hz
  steering_tire_angle_gain_var: 1.0
  wp_id_offset: 0

v2x_obstacle_avoidance:
  vehicle_radius: 0.5          # [m]
  v_max_safety: 30.0           # [m/s]
  position_jump_threshold: 5.0 # [m]

v2x_stop:
  enabled: true
  detection_range_m: 35.0
  corridor_half_width_m: 2.0
  self_ignore_radius_m: 0.75
  target_stop_gap_m: 3.0
  stop_hold_gap_m: 3.5
  release_gap_m: 5.0
  comfortable_decel_mps2: 1.2
  stale_timeout_sec: 2.0
  max_speed_cap_kmph: 30.0
  circular_path: true
  log_throttle_sec: 1.0

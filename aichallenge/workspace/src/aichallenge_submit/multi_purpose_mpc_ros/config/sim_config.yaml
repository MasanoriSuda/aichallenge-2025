sim_logger:
  animation_enabled: true

map:
  # path from pkg share dir
  yaml_path: "maps/occupancy_grid_map.yaml"

waypoints:
  # path from pkg share dir
  csv_path: "maps/occupancy_grid_map_waypoints.csv"

obstacles:
  # 2026 gate/race obstacle source is /v2x/vehicle_positions only.
  # Keep empty so obstacle information is subscribed from the topic.
  csv_path: ""
  radius: 1.25


reference_path:
  update_by_topic: false # When true, 'circle' must be false
  # path from pkg share dir
  csv_path: "maps/optimized_traj_mincurv.csv"
  resolution: 0.6
  smoothing_distance: 3
  max_width: 6.0
  circular: true
  use_path_constraints_topic: false
  use_border_cells_topic: false

bicycle_model:
  length: 1.087
  width: 1.45

mpc:
  N: 20
  Q: [3.0, 100.0, 5.0]  # [v, delta, t]
  # Q: [5.0, 90.0, 5.0]  # [v, delta, t]
  # Q: [10.0, 80.0, 5.0]  # [v, delta, t]
  R: [0.0, 300.0]      # [v, delta]
  QN: [3.0, 1.5, 5.0]
  v_max: 30.0 # km/h
  a_min: -3.2 # m/s^2
  a_max: 3.2 # m/s^2
  ay_max: 50.0 # m/s^2, maximum lateral acceleration in curves
  delta_max_deg: 80.0 # degrees
  control_rate: 50.0 # Hz
  steering_tire_angle_gain_var: 1.0
  wp_id_offset: 0

v2x_obstacle_avoidance:
  vehicle_radius: 0.5          # [m]
  v_max_safety: 30.0           # [m/s]
  position_jump_threshold: 5.0 # [m]

v2x_stop:
  enabled: true
  detection_range_m: 35.0
  corridor_half_width_m: 2.0
  self_ignore_radius_m: 0.75
  target_stop_gap_m: 3.0
  stop_hold_gap_m: 3.5
  release_gap_m: 5.0
  comfortable_decel_mps2: 1.2
  stale_timeout_sec: 2.0
  max_speed_cap_kmph: 30.0
  circular_path: true
  log_throttle_sec: 1.0

v2x_overtake:
  enabled: true
  detection_range_m: 35.0
  corridor_half_width_m: 2.0
  self_ignore_radius_m: 0.75
  min_overtake_start_gap_m: 6.0
  max_overtake_start_gap_m: 24.0
  abort_gap_m: 3.5
  abort_escape_lateral_threshold_m: 0.45
  return_clearance_m: 4.0
  preferred_side: "right"
  side_selection_policy: "largest_margin"
  side_margin_tie_threshold_m: 0.3
  lateral_offset_m: 1.65
  lateral_offset_rate_mps: 2.0
  constraint_half_width_m: 0.35
  constraint_transition_horizon_ratio: 0.25
  constraint_initial_progress: 0.45
  standby_lateral_offset_m: 0.35
  standby_side: "right"
  min_lateral_clearance_m: 1.55
  min_wall_clearance_m: 0.5
  wall_safety_margin_m: 0.2
  wall_check_horizon_m: 24.0
  overtake_speed_cap_kmph: 5.0
  prepare_speed_cap_kmph: 3.0
  follow_speed_cap_kmph: 5.0
  overtake_steer_rate_max: 1.2
  lateral_ready_threshold_m: -0.6
  steer_override_enabled: true
  steer_override_min_abs_rad: 0.16
  steer_override_until_ey_m: -0.3
  max_overtake_target_speed_kmph: 10.0
  min_closing_speed_mps: 0.3
  min_ttc_sec: 0.8
  stale_timeout_sec: 2.0
  target_lost_hold_sec: 1.2
  circular_path: true
  return_offset_threshold_m: 0.2
  log_throttle_sec: 1.0

v2x_race_behavior:
  enabled: true
  detection_range_m: 40.0
  corridor_half_width_m: 2.0
  front_conflict_lateral_window_m: 2.6
  front_conflict_gap_m: 10.0
  self_ignore_radius_m: 0.75
  min_follow_gap_m: 3.0
  time_headway_sec: 0.8
  follow_kp_gap: 0.4
  follow_kd_closing: 0.8
  follow_speed_cap_kmph: 12.0
  emergency_stop_gap_m: 2.0
  yield_detect_range_m: 12.0
  yield_start_gap_m: 8.0
  yield_release_gap_m: 14.0
  yield_min_closing_speed_mps: 0.4
  yield_speed_cap_kmph: 8.0
  yield_timeout_sec: 4.0
  yield_side_hold_sec: 1.0
  catchup_detect_range_m: 120.0
  catchup_start_gap_m: 18.0
  catchup_release_gap_m: 8.0
  catchup_speed_cap_kmph: 10.0
  catchup_timeout_sec: 30.0
  approach_start_gap_m: 34.0
  approach_speed_cap_kmph: 18.0
  min_overtake_start_gap_m: 4.0
  max_overtake_start_gap_m: 24.0
  abort_gap_m: 2.5
  abort_escape_lateral_threshold_m: 0.45
  return_clearance_m: 8.0
  return_rear_clearance_m: 4.0
  preferred_side: "right"
  side_selection_policy: "largest_margin"
  side_margin_tie_threshold_m: 0.3
  lateral_offset_m: 1.4
  lateral_offset_rate_mps: 1.2
  constraint_half_width_m: 0.55
  constraint_transition_horizon_ratio: 0.35
  constraint_initial_progress: 0.35
  min_lateral_clearance_m: 1.6
  min_wall_clearance_m: 0.5
  wall_safety_margin_m: 0.2
  wall_check_horizon_m: 16.0
  overtake_speed_cap_kmph: 12.0
  prepare_speed_cap_kmph: 9.0
  overtake_steer_rate_max: 0.8
  max_overtake_target_speed_kmph: 12.0
  min_closing_speed_mps: 0.4
  min_ttc_sec: 0.8
  stale_timeout_sec: 2.0
  target_lost_hold_sec: 1.0
  circular_path: true
  return_offset_threshold_m: 0.25
  overtake_cooldown_sec: 2.0
  side_lock_min_sec: 1.0
  side_switch_center_threshold_m: 0.45
  log_throttle_sec: 1.0

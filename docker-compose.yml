x-autoware-base: &autoware-base
  image: "aichallenge-2025-dev"
  privileged: true
  pull_policy: never
  network_mode: host
  stop_grace_period: 10s
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  environment:
    - HOME=/tmp
    - DISPLAY=${DISPLAY}
    - USER=${USER}
    - ROS_DISTRO=humble
    - XAUTHORITY=${XAUTHORITY:-}
    - QT_X11_NO_MITSHM=1
    - TZ=Asia/Tokyo
    - RUN_MODE=${RUN_MODE:-}
    - SIM_MODE=${SIM_MODE:-}
    - CMD=${CMD:-}
    - COLCON_TRACE=${COLCON_TRACE:-}
    - ROS_HOME=${ROS_HOME:-}
    - ROS_LOG_DIR=${ROS_LOG_DIR:-}
    - HOST_UID=${HOST_UID:-}
    - HOST_GID=${HOST_GID:-}
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
    - LOG_DIR=${LOG_DIR:-}
  volumes:
    - ./output:${OUTPUT_ROOT:-/output}
    - ./aichallenge:/aichallenge
    - ./remote:/remote
    - ./vehicle:/vehicle
    - ./vehicle/cyclonedds.xml:/opt/autoware/cyclonedds.xml
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /dev/dri:/dev/dri
    - ${XAUTHORITY:-/dev/null}:${XAUTHORITY:-/dev/null}:rw
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro
  devices:
    - /dev/dri
    - /dev/video0
    - /dev/input
  working_dir: /aichallenge

x-autoware-rosbag-base: &autoware-rosbag-base
  <<: *autoware-base
  stop_grace_period: 60s
  volumes:
    - ./output:${OUTPUT_ROOT:-/output}
    - ./aichallenge:/aichallenge
    - ./remote:/remote
    - ./vehicle:/vehicle
    - ./vehicle/cyclonedds.xml:/opt/autoware/cyclonedds.xml
    - ${RACING_KART_INTERFACE_DIR:-/home/tier4/racing_kart_interface}:${RACING_KART_INTERFACE_DIR:-/home/tier4/racing_kart_interface}:ro
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # No audio mount: rosbag recording needs no PulseAudio.
    - /dev/dri:/dev/dri
    - ${XAUTHORITY:-/dev/null}:${XAUTHORITY:-/dev/null}:rw

x-racing_kart_interface-base: &racing_kart_interface-base
  image: "ghcr.io/tier4/racing_kart_interface:latest-experiment"
  privileged: true
  pull_policy: never
  network_mode: host
  stop_grace_period: 10s
  user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
  environment:
    - HOME=/tmp
    - DISPLAY=${DISPLAY}
    - USER=${USER}
    - TZ=Asia/Tokyo
    - ROS_DISTRO=humble
    - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-1}
    - LOG_DIR=${LOG_DIR:-}
    - HOST_UID=${HOST_UID:-}
    - HOST_GID=${HOST_GID:-}
    - NTRIP_USERNAME=${NTRIP_USERNAME:-}
    - NTRIP_PASSWORD=${NTRIP_PASSWORD:-}
  volumes:
    - ./output:${OUTPUT_ROOT:-/output}
    - ./vehicle:/vehicle:ro
    - ./aichallenge/utils:/aichallenge/utils:ro
    - /dev/vcu:/dev/vcu
    - /dev/gnss:/dev/gnss
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /dev/dri:/dev/dri
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro
  devices:
    - /dev/dri
  group_add:
    - "${HOST_GID_DIALOUT:-20}"
  working_dir: /workspace

services:
  # Autoware service
  autoware:
    <<: *autoware-base
    command: ["bash", "-lc", "exec /aichallenge/run_autoware.bash ${RUN_MODE:-awsim} ${ROS_DOMAIN_ID:-1} ${LOG_DIR:-}"]

  # Autoware service
  autoware-build:
    <<: *autoware-base 
    command: ["bash", "-lc", "exec /aichallenge/build_autoware.bash ${HOST_UID:-} ${HOST_GID:-}"]

  simulator:
    <<: *autoware-base 
    command: ["bash", "-lc", "exec /aichallenge/run_simulator.bash"]

  autoware-command:
    <<: *autoware-base
    command: ["bash", "-lc", "cd ${CMD_WORKDIR:-/aichallenge} && exec bash -lc \"${CMD:-}\""]

  rosbag:
    <<: *autoware-rosbag-base
    command: ["bash", "-lc", 'exec /aichallenge/utils/record_all_rosbag.bash "${ROS_DOMAIN_ID:-1}" "${LOG_DIR:-}" "${RACING_KART_INTERFACE_DIR:-/home/tier4/racing_kart_interface}"']

  autoware-simulator-evaluation:
    <<: *autoware-base
    image: "aichallenge-2025-eval"
    # /aichallenge is baked into the eval image; intentionally not mounted here.
    volumes:
      - ./output:${OUTPUT_ROOT:-/output}
      - ./vehicle/cyclonedds.xml:/opt/autoware/cyclonedds.xml
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev/dri:/dev/dri
      - ${XAUTHORITY:-/dev/null}:${XAUTHORITY:-/dev/null}:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    command: ["bash", "-lc", "exec /aichallenge/run_evaluation.bash"]

#### vehicle specific services can be added here ####
  # Zenoh service
  zenoh:
    <<: *autoware-base
    working_dir: /vehicle
    command: ["bash", "-lc", "exec /vehicle/run_zenoh.bash ${VEHICLE_ID:-} ${ROS_DOMAIN_ID:-1} ${LOG_DIR:-}"]

  # Driver service
  driver:
    <<: *racing_kart_interface-base
    entrypoint: []
    command: ["bash", "-lc", "exec /vehicle/run_driver.bash vehicle ${ROS_DOMAIN_ID:-1} ${LOG_DIR:-}"]

#### remote visualization services ####
  rviz2:
    <<: *autoware-base 
    command: ["bash", "-lc", "exec /aichallenge/utils/run_rviz.bash remote"]
